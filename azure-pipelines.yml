# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
  - main

pool:
  name: 'Nitin'
  demands:
    - Agent.Name -equals AgentNitin

steps:
- task: UiPathInstallPlatform@6
  displayName: 'Step 1: Install UiPath Tooling'

- task: UiPathTest@6
  inputs:
    testTarget: 'TestSet'
    orchestratorConnection: 'UiPath_Cloud_Connection'
    projectKey: 'ETT'
    testSet: 'CICD'
    folderName: 'Testing'